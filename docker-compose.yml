services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  bot:
    build: .
    depends_on:
      - ollama
    env_file: .env
    volumes:
      - ./docs:/app/docs
      - ./data:/app/data
    restart: unless-stopped

volumes:
  ollama_data:
